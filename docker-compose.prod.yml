services:
  # Aplicação Laravel + Inertia
  app:
    build:
      context: .
      dockerfile: Dockerfile
container_name: new-cms-app
    restart: always
    ports:
      - "80:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=${APP_URL}
      - APP_KEY=${APP_KEY}
      
      # Banco de dados
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD}
      
      # Inertia (SSR desativado inicialmente)
      - INERTIA_SSR_ENABLED=false
      
      # Sessão e Cache
      - SESSION_DRIVER=database
      - CACHE_DRIVER=redis
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      
      # Logs
      - LOG_CHANNEL=stack
      - LOG_LEVEL=error
    networks:
      - cms_network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "health:check"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Servidor Web (Nginx) - removido, app já tem Nginx embutido
  # web:
  #   image: nginx:stable-alpine
  #   container_name: new-cms-web
  #   restart: always
  #   ports:
  #     - "80:80"
  #     - "443:443"  # Para SSL
  #   volumes:
  #     # Código fonte (read-only por segurança)
  #     - ./src:/var/www/html:ro
  #     # Logs do Nginx
  #     - ./docker/logs/nginx:/var/log/nginx
  #     # Configuração do Nginx
  #     - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
  #     # SSL certificates (se tiver)
  #     - ./docker/ssl:/etc/nginx/ssl:ro
  #   networks:
  #     - cms_network
  #   depends_on:
  #     - app
  #   healthcheck:
  #     test: ["CMD", "nginx", "-t"]
  #     interval: 30s
  #     timeout: 10s
  #     retries: 3

  # Banco de Dados MySQL
  db:
    image: mysql:8.0
    container_name: new-cms-db
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE:-laravel}
      - MYSQL_USER=${DB_USERNAME:-laravel}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "3306:3306"  # Apenas se precisar acessar externamente
    networks:
      - cms_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: 
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --max_allowed_packet=64M

  # Redis para Cache e Sessões
  redis:
    image: redis:7.2-alpine
    container_name: new-cms-redis
    restart: always
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    networks:
      - cms_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Worker para Filas (se precisar)
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: new-cms-worker
    restart: always
    command: php artisan queue:work --sleep=3 --tries=3 --max-time=3600
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE:-laravel}
      - DB_USERNAME=${DB_USERNAME:-laravel}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_HOST=redis
    networks:
      - cms_network
    depends_on:
      - db
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Scheduler (opcional, para tarefas agendadas)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: new-cms-scheduler
    restart: always
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    environment:
      - APP_ENV=production
      - DB_HOST=db
      - DB_DATABASE=${DB_DATABASE:-sites}
      - DB_USERNAME=${DB_USERNAME:-usersite}
      - DB_PASSWORD=${DB_PASSWORD}
    networks:
      - cms_network
    depends_on:
      - db
      - redis

# Redes
networks:
  cms_network:
    driver: bridge
    name: new-cms-network

# Volumes persistentes
volumes:
  db_data:
    name: new-cms-db-data
  redis_data:
    name: new-cms-redis-data