services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
      target: ${APP_ENV:-development}  # ← Chave mágica!
    container_name: laravel_app_${APP_ENV:-dev}
    volumes:
      # Volume APENAS para desenvolvimento (será ignorado em produção)
      - type: bind
        source: ./src
        target: /var/www/html
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_DEBUG=${APP_DEBUG:-true}
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=sites
      - DB_USERNAME=usersite
      - DB_PASSWORD=usersite
    networks:
      - laravel
    depends_on:
      - db

  web:
    image: nginx:stable-alpine
    container_name: nginx_${APP_ENV:-dev}
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

  db:
    image: mysql:8.0
    container_name: database_${APP_ENV:-dev}
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: ${DB_DATABASE:-laravel}
      MYSQL_USER: ${DB_USERNAME:-laravel}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql
    networks:
      - laravel

networks:
  laravel:
    driver: bridge

volumes:
  db-data: